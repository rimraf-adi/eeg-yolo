# ==========================================
# EEG 1D Point-YOLO Master Configuration
# ==========================================

paths:
  # Base dataset root directory mapping
  base_dir: "/Volumes/WORKSPACE/opensource-dataset"
  
  # Raw input directories
  mat_dir: "/Volumes/WORKSPACE/opensource-dataset/MAT_Files"
  
  # Extracted and compiled intermediate processing states
  events_dir: "/Volumes/WORKSPACE/opensource-dataset/extracted_events"
  parquet_data_dir: "/Volumes/WORKSPACE/opensource-dataset/parquet_data"
  discard_dir: "/Volumes/WORKSPACE/opensource-dataset/discarded"
  
  # Final cleanly processed execution states targeting Training pipelines
  processed_events_dir: "/Volumes/WORKSPACE/opensource-dataset/processed/extracted_events"
  processed_parquet_dir: "/Volumes/WORKSPACE/opensource-dataset/processed/parquet_data"

training:
  epochs: 50
  batch_size: 128
  learning_rate: 0.001
  patience: 5
  results_file: "results.txt"

model:
  in_channels: 18
  num_classes: 3

dataset:
  window_size_sec: 10.0
  stride_sec: 10.0
  fs: 500
  S: 100
  tau: 0.25
